name: NPM Publish

on:
  push:
    branches:
      - main  # Adjust this to the main branch or your default branch

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
            fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        env:
            NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Build
        run: npm run build 

      - name: Check for version change
        id: check-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LAST_VERSION=$(git describe --tags --abbrev=0)
          
          echo "::set-output name=CURRENT_VERSION::$CURRENT_VERSION"
          echo "::set-output name=LAST_VERSION::$LAST_VERSION"
          
          if [ "v$CURRENT_VERSION" = "$LAST_VERSION" ]; then
            echo "No version change. Skipping publish."
            exit 78  # Exit code 78 skips the rest of the job
          fi

      - name: Publish to GitHub Packages
        if: steps.check-version.outcome == 'success'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Tag commit
        if: steps.check-version.outcome == 'success'
        run: |
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "v${{ steps.check-version.outputs.CURRENT_VERSION }}" -m "Release v${{ steps.check-version.outputs.CURRENT_VERSION }}"
            git push origin "v${{ steps.check-version.outputs.CURRENT_VERSION }}"
